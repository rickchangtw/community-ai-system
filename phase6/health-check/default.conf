upstream ceo-agent {
    server http://localhost:3001;
}

upstream property-agent {
    server http://localhost:3002;
}

upstream security-agent {
    server http://localhost:3003;
}

upstream fire-agent {
    server http://localhost:3004;
}

upstream energy-agent {
    server http://localhost:3005;
}

upstream notice-agent {
    server http://localhost:3006;
}

upstream line-bot {
    server http://localhost:3021;
}

upstream meeting-transcription {
    server http://localhost:3011;
}

upstream monitoring-agent {
    server http://localhost:3010;
}

server {
    listen 3000;
    server_name localhost;

    location / {
        return 200 '{"status": "ok", "message": "All services healthy"}';
        add_header Content-Type application/json;
    }

    location /ceo {
        proxy_pass http://ceo-agent/health;
    }

    location /property {
        proxy_pass http://property-agent/health;
    }

    location /security {
        proxy_pass http://security-agent/health;
    }

    location /fire {
        proxy_pass http://fire-agent/health;
    }

    location /energy {
        proxy_pass http://energy-agent/health;
    }

    location /notice {
        proxy_pass http://notice-agent/health;
    }

    location /line {
        proxy_pass http://line-bot/health;
    }

    location /meeting {
        proxy_pass http://meeting-transcription/health;
    }

    location /monitoring {
        proxy_pass http://monitoring-agent/health;
    }
}
