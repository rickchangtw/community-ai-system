<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實時會議轉錄系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .system-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .info-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .info-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        
        .info-card .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
        }
        
        .info-card .label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .main-interface {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .control-group {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
        }
        
        .control-group h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        
        .meeting-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .meeting-input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .meeting-input:focus {
            border-color: #667eea;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }
        
        .btn-info {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
        }
        
        .status-running {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status-stopped {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-running .status-dot {
            background: #28a745;
        }
        
        .status-stopped .status-dot {
            background: #dc3545;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .speaker-panel {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .speaker-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 8px 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            font-size: 0.9em;
            margin: 5px;
        }
        
        .speaker-tag .confidence {
            font-size: 0.8em;
            opacity: 0.9;
        }
        
        .transcription-area {
            min-height: 300px;
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 20px;
            background: #f8f9fa;
            overflow-y: auto;
        }
        
        .transcription-item {
            padding: 10px 15px;
            margin-bottom: 10px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        
        .transcription-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        
        .transcription-item.speaker-known {
            border-left-color: #28a745;
            background: #f0fff0;
        }
        
        .transcription-item.speaker-unknown {
            border-left-color: #ffc107;
            background: #fff8e1;
        }
        
        .transcription-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .speaker-name {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1em;
        }
        
        .speaker-name.unknown {
            color: #999;
        }
        
        .transcription-text {
            color: #333;
            line-height: 1.6;
            font-size: 1em;
        }
        
        .confidence-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            transition: width 0.3s;
        }
        
        .timestamp {
            font-size: 0.8em;
            color: #999;
            margin-top: 3px;
        }
        
        .clear-btn {
            float: right;
            background: none;
            border: none;
            color: #dc3545;
            cursor: pointer;
            font-size: 1.2em;
            padding: 5px 10px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .clear-btn:hover {
            background: #f8d7da;
        }
        
        .log-panel {
            background: #1a1a2e;
            color: #00ff88;
            border-radius: 10px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 3px 0;
        }
        
        .log-time {
            color: #00ff88;
            margin-right: 10px;
        }
        
        .log-info {
            color: #00ff88;
        }
        
        .log-warn {
            color: #ffaa00;
        }
        
        .log-error {
            color: #ff4444;
        }
        
        .connection-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        
        .connection-connected {
            background: #28a745;
            color: white;
        }
        
        .connection-disconnected {
            background: #dc3545;
            color: white;
        }
        
        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ 實時會議轉錄系統</h1>
        
        <div class="system-info">
            <div class="info-card">
                <h3>📋 會議編號</h3>
                <div class="value" id="meetingId">未開始</div>
                <div class="label">MEET-YYYY-MM-DD</div>
            </div>
            <div class="info-card">
                <h3>🕐 開始時間</h3>
                <div class="value" id="startTime">-</div>
                <div class="label">會議開始</div>
            </div>
            <h3>🖥️ 設備</h3>
            <div class="value" id="device">載入中...</div>
            <div class="label">處理設備</div>
        </div>
        
        <div class="main-interface">
            <h2 style="color: #333; margin-bottom: 20px;">📋 會議控制</h2>
            
            <div class="controls">
                <div class="control-group">
                    <h3>📝 會議資訊</h3>
                    <div class="meeting-info">
                        <input type="text" class="meeting-input" id="meetingIdInput" placeholder="輸入會議編號 (可選)">
                        <button class="btn btn-primary" id="startBtn" onclick="startMeeting()">
                            ▶️ 開始會議
                        </button>
                        <button class="btn btn-danger" id="endBtn" onclick="endMeeting()" disabled>
                            ⏹️ 結束會議
                        </button>
                    </div>
                </div>
                
                <div class="control-group">
                    <h3>🎛️ 系統狀態</h3>
                    <div class="status-indicator status-running" id="statusIndicator" style="margin-bottom: 15px;">
                        <span class="status-dot"></span>
                        <span>系統已就緒</span>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-info" onclick="clearBuffer()">🗑️ 清除緩衝</button>
                        <button class="btn btn-success" onclick="connectWebSocket()">🔌 連接 WebSocket</button>
                        <button class="btn btn-primary" onclick="checkStatus()">📊 檢查狀態</button>
                    </div>
                </div>
            </div>
            
            <h2 style="color: #333; margin-bottom: 20px;">👤 發言人</h2>
            <div class="speaker-panel" id="speakerPanel">
                <span class="speaker-tag">等待發言人...</span>
            </div>
            
            <h2 style="color: #333; margin-bottom: 20px;">📝 轉錄結果</h2>
            <div class="transcription-area" id="transcriptionArea">
                <div style="text-align: center; color: #999; padding: 50px;">
                    <p>🎙️ 等待會議開始...</p>
                    <p style="margin-top: 10px; font-size: 0.9em;">點擊「開始會議」按鈕開始轉錄</p>
                </div>
            </div>
            
            <h2 style="color: #333; margin-bottom: 20px;">📋 系統日誌</h2>
            <div class="log-panel" id="logPanel">
                <div class="log-entry">
                    <span class="log-time">[系統]</span>
                    <span class="log-info">系統已就緒，等待啟動...</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="connection-status connection-disconnected" id="connectionStatus">
        🔌 未連接
    </div>
    
    <script>
        let ws = null;
        let meetingRunning = false;
        
        // 系統狀態
        const systemStatus = {
            running: false,
            meetingId: null,
            speakers: [],
            currentSpeaker: null,
            isSpeaking: false,
            confidence: 0
        };
        
        function log(message, type = 'info') {
            const logPanel = document.getElementById('logPanel');
            const time = new Date().toLocaleTimeString('zh-TW');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${time}]</span><span class="log-${type}">${message}</span>`;
            logPanel.appendChild(entry);
            logPanel.scrollTop = logPanel.scrollHeight;
        }
        
        function updateStatus() {
            const statusIndicator = document.getElementById('statusIndicator');
            if (systemStatus.running) {
                statusIndicator.className = 'status-indicator status-running';
                statusIndicator.innerHTML = '<span class="status-dot"></span><span>系統運行中</span>';
            } else {
                statusIndicator.className = 'status-indicator status-stopped';
                statusIndicator.innerHTML = '<span class="status-dot"></span><span>系統已停止</span>';
            }
        }
        
        function updateConnectionStatus() {
            const connectionStatus = document.getElementById('connectionStatus');
            if (ws && ws.readyState === WebSocket.OPEN) {
                connectionStatus.className = 'connection-status connection-connected';
                connectionStatus.textContent = '🔌 已連接';
            } else {
                connectionStatus.className = 'connection-status connection-disconnected';
                connectionStatus.textContent = '🔌 未連接';
            }
        }
        
        function startMeeting() {
            const meetingId = document.getElementById('meetingIdInput').value.trim();
            if (!meetingId) {
                meetingId = `MEET-${new Date().toISOString().slice(0, 10)}`;
            }
            
            fetch('/api/start-meeting', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({meeting_id: meetingId})
            })
            .then(response => response.json())
            .then(data => {
                systemStatus.running = true;
                systemStatus.meetingId = data.meeting_id;
                document.getElementById('meetingId').textContent = data.meeting_id;
                document.getElementById('startTime').textContent = new Date().toLocaleTimeString('zh-TW');
                document.getElementById('startBtn').disabled = true;
                document.getElementById('endBtn').disabled = false;
                log(`會議已開始：${data.meeting_id}`, 'info');
                updateStatus();
                
                // 連接 WebSocket
                connectWebSocket();
            })
            .catch(error => {
                log(`開始會議錯誤：${error.message}`, 'error');
            });
        }
        
        function endMeeting() {
            fetch('/api/end-meeting', {method: 'POST'})
            .then(response => response.json())
            .then(data => {
                systemStatus.running = false;
                log(`會議已結束：${data.meeting_id}`, 'info');
                updateStatus();
                
                // 斷開 WebSocket
                if (ws) {
                    ws.close();
                }
                
                // 清空轉錄
                document.getElementById('transcriptionArea').innerHTML = `
                    <div style="text-align: center; color: #999; padding: 50px;">
                        <p>📋 會議已結束</p>
                        <p style="margin-top: 10px; font-size: 0.9em;">會議記錄已保存</p>
                    </div>
                `;
                
                document.getElementById('startBtn').disabled = false;
                document.getElementById('endBtn').disabled = true;
            })
            .catch(error => {
                log(`結束會議錯誤：${error.message}`, 'error');
            });
        }
        
        function connectWebSocket() {
            if (!systemStatus.running) {
                log('系統未運行，請先開始會議', 'warn');
                return;
            }
            
            try {
                ws = new WebSocket(`ws://${window.location.host}/ws/transcription`);
                
                ws.onopen = () => {
                    log('WebSocket 已連接', 'info');
                    updateConnectionStatus();
                };
                
                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'transcription') {
                        handleTranscription(data);
                    } else if (data.type === 'error') {
                        log(`錯誤：${data.message}`, 'error');
                    }
                };
                
                ws.onclose = () => {
                    log('WebSocket 已斷開', 'warn');
                    updateConnectionStatus();
                };
                
                ws.onerror = (error) => {
                    log(`WebSocket 錯誤：${error.message}`, 'error');
                };
            } catch (error) {
                log(`連接 WebSocket 錯誤：${error.message}`, 'error');
            }
        }
        
        function handleTranscription(data) {
            systemStatus.currentSpeaker = data.speaker;
            systemStatus.confidence = data.confidence;
            
            const transcriptionArea = document.getElementById('transcriptionArea');
            
            // 創建轉錄項目
            const item = document.createElement('div');
            item.className = `transcription-item ${data.speaker || 'unknown' === 'unknown' ? 'speaker-unknown' : 'speaker-known'}`;
            
            let speakerName = data.speaker;
            if (!speakerName || speakerName === 'unknown') {
                speakerName = '未知發言人';
            }
            
            const confidencePercent = Math.round(data.confidence * 100);
            
            item.innerHTML = `
                <div class="transcription-header">
                    <span class="speaker-name ${data.speaker || 'unknown'} === 'unknown' ? 'unknown' : ''}">${speakerName}</span>
                    <span class="timestamp">${data.timestamp || new Date().toLocaleTimeString('zh-TW')}</span>
                </div>
                <div class="transcription-text">${data.text}</div>
                <div class="confidence-bar">
                    <div class="confidence-fill" style="width: ${confidencePercent}%"></div>
                </div>
            `;
            
            transcriptionArea.appendChild(item);
            transcriptionArea.scrollTop = transcriptionArea.scrollHeight;
            
            // 更新發言人面板
            updateSpeakerPanel(data.speaker);
            
            log(`${speakerName}: ${data.text.substring(0, 50)}...`, 'info');
        }
        
        function updateSpeakerPanel(speaker) {
            const speakerPanel = document.getElementById('speakerPanel');
            const existing = document.querySelectorAll('.speaker-tag');
            existing.forEach(tag => tag.remove());
            
            if (!speaker) {
                speakerPanel.innerHTML = '<span class="speaker-tag">等待發言人...</span>';
                return;
            }
            
            const speakerTag = document.createElement('span');
            speakerTag.className = 'speaker-tag';
            speakerTag.innerHTML = `
                👤 ${speaker.name}
                <span class="confidence">${Math.round(speaker.confidence * 100)}%</span>
            `;
            speakerPanel.appendChild(speakerTag);
        }
        
        function clearBuffer() {
            document.getElementById('transcriptionArea').innerHTML = `
                <div style="text-align: center; color: #999; padding: 50px;">
                    <p>🗑️ 轉錄緩衝已清除</p>
                </div>
            `;
            log('轉錄緩衝已清除', 'info');
        }
        
        function checkStatus() {
            fetch('/api/status')
            .then(response => response.json())
            .then(data => {
                systemStatus.running = data.running;
                systemStatus.meetingId = data.meeting_id;
                systemStatus.speakers = data.speakers;
                systemStatus.currentSpeaker = data.current_speaker;
                systemStatus.confidence = data.confidence;
                updateStatus();
                updateSpeakerPanel(data.current_speaker);
                log(`系統狀態：${data.running ? '運行中' : '已停止'}`, 'info');
            })
            .catch(error => {
                log(`檢查狀態錯誤：${error.message}`, 'error');
            });
        }
    </script>
</body>
</html>
